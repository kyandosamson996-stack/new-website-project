<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samson Kyando</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            margin: 0;
            color: #333;
        }

        .container {
            text-align: center;
            padding: 50px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            display: inline-block;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        h1 {
            color: #007BFF;
        }

        p {
            font-size: 18px;
        }

        button {
            background: #007BFF;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h1>Hello, I'm Samson Kyando 👋</h1>
            <p>Welcome to my personal webpage.</p>
            <p>I am learning HTML and CSS!</p>

            <button onclick="showMessage()">Click Me</button>
        </div>
    </div>

    <script>
        function showMessage() {
            alert("Welcome Samson! Keep learning 💻");
        }
    </script>

</body>
</html>
